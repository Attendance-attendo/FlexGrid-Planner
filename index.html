<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexGrid by yuvan</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #facc15; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        /* Dashboard Styles */
        #dashboard { max-width: 900px; margin: 0 auto; }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 25px; }
        .file-card { background: var(--card); padding: 25px 15px; border-radius: 15px; border: 1px solid var(--border); cursor: pointer; text-align: center; transition: 0.2s; position: relative; }
        .file-card:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .file-card b { display: block; font-size: 30px; margin-bottom: 10px; }
        .file-name { display: block; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* Action Icons on Cards */
        .card-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 8px; }
        .action-btn { cursor: pointer; font-size: 14px; opacity: 0.6; transition: 0.2s; }
        .action-btn:hover { opacity: 1; transform: scale(1.2); }

        /* Editor Styles */
        #editor { display: none; }
        .header-bar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        button { border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 11px; color: white; background: var(--border); }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-green { background: #22c55e; }

        .table-container { width: 100%; overflow-x: auto; background: var(--card); border-radius: 12px; border: 1px solid var(--border); max-height: 75vh; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: center; min-width: 45px; }
        th:first-child, td:first-child { position: sticky; left: 0; background: #1e293b; z-index: 10; min-width: 200px; text-align: left; border-right: 3px solid var(--gold); }
        td input { background: transparent; border: none; color: white; width: 100%; outline: none; font-weight: 700; font-size: 14px; }
        .check-cell { cursor: pointer; font-size: 20px; user-select: none; }
    </style>
</head>
<body>

    <div id="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px;">
            <h1 style="color: var(--gold); margin: 0;">FlexGrid Hub</h1>
            <button class="btn-gold" onclick="createNewSheet()">+ NEW SHEET</button>
        </div>
        <div id="fileList" class="file-grid"></div>
        <div style="margin-top: 40px; text-align: center;">
            <button class="btn-green" onclick="downloadMasterBackup()">📥 DOWNLOAD MASTER BACKUP</button>
        </div>
    </div>

    <div id="editor">
        <div class="header-bar">
            <button onclick="backToDashboard()">⬅ BACK</button>
            <h2 id="currentSheetTitle" style="margin: 0; color: var(--gold); font-size: 18px;"></h2>
            <div style="display: flex; gap: 8px;">
                <button class="btn-gold" onclick="addNewTask()">+ TASK</button>
                <button onclick="addCustomColumn()">+ COL</button>
            </div>
        </div>
        <div class="table-container">
            <table>
                <thead><tr id="headRow"><th>TASK LIST</th></tr></thead>
                <tbody id="gridBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let allSheets = JSON.parse(localStorage.getItem('flexGridSheets') || '{}');
        let currentSheetId = null;

        function renderDashboard() {
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('editor').style.display = 'none';
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            
            Object.keys(allSheets).forEach(id => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.innerHTML = `
                    <div class="card-actions">
                        <span class="action-btn" title="Rename" onclick="renameSheet(event, '${id}')">✏️</span>
                        <span class="action-btn" title="Delete" style="color:#ef4444" onclick="deleteSheet(event, '${id}')">×</span>
                    </div>
                    <b>📄</b>
                    <span class="file-name">${allSheets[id].name}</span>
                `;
                card.onclick = () => openSheet(id);
                list.appendChild(card);
            });
        }

        function createNewSheet() {
            const name = prompt("Name your new sheet:");
            if (!name) return;
            const id = 'sheet_' + Date.now();
            const days = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
            allSheets[id] = { name: name, data: { headerCount: days, rows: [] } };
            saveToStorage();
            renderDashboard();
        }

        function renameSheet(e, id) {
            e.stopPropagation();
            const newName = prompt("Rename sheet to:", allSheets[id].name);
            if (newName && newName !== allSheets[id].name) {
                allSheets[id].name = newName;
                saveToStorage();
                renderDashboard();
            }
        }

        function openSheet(id) {
            currentSheetId = id;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('editor').style.display = 'block';
            document.getElementById('currentSheetTitle').innerText = allSheets[id].name;
            
            const headRow = document.getElementById('headRow');
            headRow.innerHTML = '<th>TASK LIST</th>';
            const count = allSheets[id].data.headerCount || 30;
            
            for(let i = 1; i <= count; i++) {
                const th = document.createElement('th');
                th.innerText = i;
                headRow.appendChild(th);
            }

            const gridBody = document.getElementById('gridBody');
            gridBody.innerHTML = '';
            allSheets[id].data.rows.forEach(r => renderTaskRow(r.name, r.checks));
        }

        function renderTaskRow(name = "", checks = []) {
            const row = document.createElement('tr');
            row.innerHTML = `<td><input type="text" value="${name}" onchange="updateData()" placeholder="..."></td>`;
            const cols = document.getElementById('headRow').children.length - 1;
            for(let i = 0; i < cols; i++) {
                const td = document.createElement('td');
                td.className = "check-cell";
                td.innerText = checks[i] || "";
                if(td.innerText === "✓") td.style.color = "var(--gold)";
                td.onclick = function() {
                    this.innerText = this.innerText === "✓" ? "" : "✓";
                    this.style.color = this.innerText === "✓" ? "var(--gold)" : "";
                    updateData();
                };
                row.appendChild(td);
            }
            document.getElementById('gridBody').appendChild(row);
        }

        function addNewTask() { renderTaskRow(); updateData(); }

        function addCustomColumn() {
            const th = document.createElement('th');
            th.innerText = document.getElementById('headRow').children.length;
            document.getElementById('headRow').appendChild(th);
            Array.from(document.getElementById('gridBody').rows).forEach(row => {
                const td = document.createElement('td');
                td.className = "check-cell";
                td.onclick = function() { 
                    this.innerText = this.innerText === "✓" ? "" : "✓"; 
                    this.style.color = "var(--gold)";
                    updateData();
                };
                row.appendChild(td);
            });
            updateData();
        }

        function updateData() {
            allSheets[currentSheetId].data = {
                headerCount: document.getElementById('headRow').children.length - 1,
                rows: Array.from(document.getElementById('gridBody').rows).map(row => ({
                    name: row.cells[0].querySelector('input').value,
                    checks: Array.from(row.cells).slice(1).map(td => td.innerText)
                }))
            };
            saveToStorage();
        }

        function saveToStorage() { localStorage.setItem('flexGridSheets', JSON.stringify(allSheets)); }
        function backToDashboard() { renderDashboard(); }
        function deleteSheet(e, id) { e.stopPropagation(); if(confirm("Permanently delete this file?")) { delete allSheets[id]; saveToStorage(); renderDashboard(); } }

        function downloadMasterBackup() {
            const blob = new Blob([JSON.stringify(allSheets)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `FlexGrid_Master_Backup.json`;
            a.click();
        }

        renderDashboard();
    </script>
</body>
</html>
